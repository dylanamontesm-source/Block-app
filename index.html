<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block App — Horarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="container">

    <div class="hero">
      <span class="eyebrow">Block App</span>
      <h1>Configura tu horario</h1>
      <p>Define el rango de horas y los días en los que deseas activar el bloqueo de aplicaciones.</p>
    </div>

    <div class="card">

      <!-- Hora inicio -->
      <div class="field">
        <div class="label-row">
          <span class="label-title">Hora de inicio</span>
          <span class="label-info">por defecto 22:00</span>
        </div>
        <input type="time" id="inicio" value="22:00" />
      </div>

      <!-- Hora fin -->
      <div class="field">
        <div class="label-row">
          <span class="label-title">Hora de fin</span>
          <span class="label-info">por defecto 06:00</span>
        </div>
        <input type="time" id="fin" value="06:00" />
      </div>

      <!-- Días -->
      <div class="field">
        <label class="label-title">Días activos</label>
        <div class="days">
          <button class="day" type="button">Lun</button>
          <button class="day" type="button">Mar</button>
          <button class="day" type="button">Mié</button>
          <button class="day" type="button">Jue</button>
          <button class="day" type="button">Vie</button>
          <button class="day" type="button">Sáb</button>
          <button class="day" type="button">Dom</button>
        </div>
      </div>

      <!-- Confirmación inline -->
      <div id="confirmacion" class="message hidden"></div>

      <!-- Guardar -->
      <button class="button" id="btnGuardar" type="button">Guardar horario</button>

    </div>
  </div>

  <!-- Modal de éxito -->
  <div class="modal-backdrop hidden" id="modal">
    <div class="modal-content">
      <button class="modal-close" id="modalCerrar" type="button" aria-label="Cerrar">✕</button>
      <div class="modal-icon">✓</div>
      <h2>¡Horario guardado!</h2>
      <p id="modalTexto"></p>
      <button class="button secondary" id="modalAceptar" type="button">Aceptar</button>
    </div>
  </div>

<script src="script.js"></script>
<link rel="stylesheet" href="modulo.css" />
</body>
</html>
