<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block App — Horarios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #09080f;
      --surface: rgba(255,255,255,0.06);
      --surface-strong: rgba(255,255,255,0.12);
      --text: #f8f7ff;
      --muted: #9ca3af;
      --primary: #7c3aed;
      --accent: #22c55e;
      --border: rgba(255,255,255,0.14);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Outfit', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,58,237,0.16), transparent 20%),
        radial-gradient(circle at bottom right, rgba(34,197,94,0.12), transparent 20%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container { width: min(520px, 100%); }

    .hero {
      margin-bottom: 24px;
      padding: 24px;
      border-radius: var(--radius);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .eyebrow {
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--muted);
      font-size: 0.72rem;
      margin-bottom: 12px;
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 3.5vw, 2.5rem);
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 24px;
      display: grid;
      gap: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.22);
    }

    .field { display: grid; gap: 10px; }

    .field label,
    .label-title {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
    }

    .label-info {
      color: var(--muted);
      font-size: 0.9rem;
    }

    input[type="time"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--surface);
      color: var(--text);
      padding: 14px 16px;
      font-size: 1.1rem;
      font-family: 'Outfit', sans-serif;
    }

    input[type="time"]:focus {
      outline: 2px solid rgba(124,58,237,0.35);
    }

    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.5;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(7, minmax(48px, 1fr));
      gap: 10px;
    }

    .day {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 0;
      background: var(--surface);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .day:hover {
      transform: translateY(-2px);
      border-color: rgba(124,58,237,0.4);
    }

    .day.active {
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      border-color: transparent;
      color: white;
    }

    .button {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 32px rgba(124,58,237,0.28);
    }

    .button.secondary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }

    .message {
      background: rgba(22,163,74,0.14);
      border: 1px solid rgba(22,163,74,0.25);
      padding: 16px;
      border-radius: 18px;
      color: #d1fae5;
      text-align: center;
    }

    .hidden { display: none; }

    /* Modal — usa un faux-viewport para no romper el layout */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(3,6,15,0.82);
      padding: 20px;
      z-index: 10;
    }

    .modal-backdrop.hidden { display: none; }

    .modal-content {
      position: relative;
      width: min(420px, 100%);
      background: rgba(15,12,32,0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 30px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0,0,0,0.35);
    }

    .modal-close {
      position: absolute;
      right: 20px;
      top: 20px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .modal-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      background: rgba(34,197,94,0.16);
      color: #86efac;
      font-size: 2rem;
    }

    .modal-content h2 {
      margin: 0 0 12px;
      font-size: 1.6rem;
    }

    .modal-content p {
      color: var(--muted);
      line-height: 1.7;
      margin: 0 0 20px;
    }

    @media (max-width: 440px) {
      .days { grid-template-columns: repeat(4, minmax(44px, 1fr)); }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="hero">
      <span class="eyebrow">Block App</span>
      <h1>Configura tu horario</h1>
      <p>Define el rango de horas y los días en los que deseas activar el bloqueo de aplicaciones.</p>
    </div>

    <div class="card">

      <!-- Hora inicio -->
      <div class="field">
        <div class="label-row">
          <span class="label-title">Hora de inicio</span>
          <span class="label-info">por defecto 22:00</span>
        </div>
        <input type="time" id="inicio" value="22:00" />
      </div>

      <!-- Hora fin -->
      <div class="field">
        <div class="label-row">
          <span class="label-title">Hora de fin</span>
          <span class="label-info">por defecto 06:00</span>
        </div>
        <input type="time" id="fin" value="06:00" />
      </div>

      <!-- Días -->
      <div class="field">
        <label class="label-title">Días activos</label>
        <div class="days">
          <button class="day" type="button">Lun</button>
          <button class="day" type="button">Mar</button>
          <button class="day" type="button">Mié</button>
          <button class="day" type="button">Jue</button>
          <button class="day" type="button">Vie</button>
          <button class="day" type="button">Sáb</button>
          <button class="day" type="button">Dom</button>
        </div>
      </div>

      <!-- Confirmación inline -->
      <div id="confirmacion" class="message hidden"></div>

      <!-- Guardar -->
      <button class="button" id="btnGuardar" type="button">Guardar horario</button>

    </div>
  </div>

  <!-- Modal de éxito -->
  <div class="modal-backdrop hidden" id="modal">
    <div class="modal-content">
      <button class="modal-close" id="modalCerrar" type="button" aria-label="Cerrar">✕</button>
      <div class="modal-icon">✓</div>
      <h2>¡Horario guardado!</h2>
      <p id="modalTexto"></p>
      <button class="button secondary" id="modalAceptar" type="button">Aceptar</button>
    </div>
  </div>

  <script>
    const dayButtons   = document.querySelectorAll('.day');
    const btnGuardar   = document.getElementById('btnGuardar');
    const confirmacion = document.getElementById('confirmacion');
    const modal        = document.getElementById('modal');
    const modalCerrar  = document.getElementById('modalCerrar');
    const modalAceptar = document.getElementById('modalAceptar');
    const modalTexto   = document.getElementById('modalTexto');
    const inicioInput  = document.getElementById('inicio');
    const finInput     = document.getElementById('fin');

    const toggleDay = (btn) => btn.classList.toggle('active');

    const getSelectedDays = () =>
      [...dayButtons]
        .filter(b => b.classList.contains('active'))
        .map(b => b.textContent.trim());

    const showMessage = (text) => {
      confirmacion.textContent = text;
      confirmacion.classList.remove('hidden');
      setTimeout(() => confirmacion.classList.add('hidden'), 3600);
    };

    const openModal = (text) => {
      modalTexto.textContent = text;
      modal.classList.remove('hidden');
    };

    const closeModal = () => modal.classList.add('hidden');

    const saveSchedule = async (inicio, fin, days) => {
      try {
        const response = await fetch('save_schedule.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ inicio, fin, days }),
        });
        const result = await response.json();
        if (!response.ok || !result.success) throw new Error(result.message || 'Error al guardar el horario.');
        const daysText = days.length ? days.join(', ') : 'ningún día';
        showMessage(`Horario guardado de ${inicio} a ${fin}. Días: ${daysText}`);
        openModal(`Tu horario se guardó de ${inicio} a ${fin} para ${daysText}.`);
      } catch (error) {
        showMessage(`No se pudo guardar: ${error.message}`);
      }
    };

    dayButtons.forEach(btn => btn.addEventListener('click', () => toggleDay(btn)));

    btnGuardar.addEventListener('click', () => {
      const inicio = inicioInput.value || '22:00';
      const fin    = finInput.value    || '06:00';
      const days   = getSelectedDays();
      saveSchedule(inicio, fin, days);
    });

    modalCerrar.addEventListener('click', closeModal);
    modalAceptar.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
  </script>

</body>
</html>
